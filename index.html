    <!-- Pi Environment Validation -->
    <script>
      (function() {
        const VALIDATION_KEY = "c8c119ed9f09ef7bfbca58a9874950d4dc305b14be8b7d680b3fb52002a51e3b8e0e0602fe7bc25d7e775548bd860a771dfff8261b67f0b328be5f91c348fe12";
        const API_KEY = "x62ea5gjqi4fv1x5cojbi84al9zzdstehnnm3tfzjlt4bol8pq1eohej2udoelhw";
        
        console.log('[PI VALIDATION] 🔍 Validating Pi environment...');
        
        // Check HTTPS (more lenient for development)
        if (window.location.protocol !== 'https:') {
          if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
            console.warn('[PI VALIDATION] ⚠️ Development mode: HTTPS recommended but not enforced');
            console.log('[PI VALIDATION] 💡 For production Pi validation, use HTTPS');
          } else {
            console.warn('[PI VALIDATION] ⚠️ Not on HTTPS - Pi Browser requires HTTPS for validation');
          }
        } else {
          console.log('[PI VALIDATION] ✅ HTTPS detected - Pi SDK validation enabled');
        }
        
        // Validate manifest.json
        fetch('/manifest.json')
          .then(r => {
            if (!r.ok) throw new Error('Failed to fetch manifest');
            return r.json();
          })
          .then(manifest => {
            const mApiKey = manifest.pi_app?.api_key;
            const mValidationKey = manifest.pi_app?.validation_key;
            
            if (mApiKey === API_KEY && mValidationKey === VALIDATION_KEY) {
              console.log('[PI VALIDATION] ✅ Manifest validation keys match');
            } else {
              console.error('[PI VALIDATION] ❌ Manifest validation mismatch');
              console.error('  Expected API Key:', API_KEY);
              console.error('  Manifest API Key:', mApiKey);
              console.error('  Expected Validation Key:', VALIDATION_KEY.substring(0, 30) + '...');
              console.error('  Manifest Validation Key:', mValidationKey?.substring(0, 30) + '...');
            }
          })
          .catch(err => {
            console.error('[PI VALIDATION] ❌ Failed to fetch manifest.json:', err.message);
          });
        
        // Validate validation-key.txt
        fetch('/validation-key.txt')
          .then(r => r.text())
          .then(key => {
            const fetchedKey = key.trim();
            console.log('[PI VALIDATION] 📄 Fetched key:', fetchedKey.substring(0, 20) + '...');
            if (fetchedKey === VALIDATION_KEY) {
              console.log('[PI VALIDATION] ✅ validation-key.txt matches');
            } else {
              console.error('[PI VALIDATION] ❌ validation-key.txt mismatch');
              console.error('  Expected:', VALIDATION_KEY.substring(0, 20) + '...');
              console.error('  Got:', fetchedKey.substring(0, 20) + '...');
            }
          })
          .catch(err => {
            console.error('[PI VALIDATION] ❌ Failed to fetch validation-key.txt:', err.message);
          });
      })();
    </script>

    <!-- Global error and warning handler for Pi SDK -->
    <script>
      // Catch and log any errors related to Pi SDK
      const originalError = console.error;
      const originalWarn = console.warn;
      
      console.error = function(...args) {
        // Log to original console
        originalError.apply(console, args);
        
        // Check if it's a Pi SDK related error
        const errorStr = String(args[0] || '').toLowerCase();
        if (errorStr.includes('pi') || errorStr.includes('sdk') || errorStr.includes('authenticate')) {
          console.log('[PI ERROR HANDLER] 🚨 Pi SDK error caught:', args);
        }
      };
      
      console.warn = function(...args) {
        originalWarn.apply(console, args);
        const warnStr = String(args[0] || '').toLowerCase();
        if (warnStr.includes('pi') || warnStr.includes('sdk')) {
          console.log('[PI ERROR HANDLER] ⚠️ Pi SDK warning caught:', args);
        }
      };
      
      // Monitor for uncaught errors
      window.addEventListener('error', function(event) {
        const errorMsg = String(event.message || event.error || '').toLowerCase();
        if (errorMsg.includes('pi') || errorMsg.includes('sdk') || errorMsg.includes('authenticate')) {
          console.error('[PI ERROR HANDLER] 🔴 Uncaught error related to Pi:', {
            message: event.message,
            error: event.error,
            filename: event.filename,
            lineno: event.lineno,
            colno: event.colno
          });
        }
      });
      
      // Monitor for unhandled promise rejections
      window.addEventListener('unhandledrejection', function(event) {
        const rejectStr = String(event.reason || '').toLowerCase();
        if (rejectStr.includes('pi') || rejectStr.includes('sdk') || rejectStr.includes('authenticate')) {
          console.error('[PI ERROR HANDLER] 🔴 Unhandled promise rejection related to Pi:', event.reason);
        }
      });
      
      console.log('[PI ERROR HANDLER] ✅ Global error handlers installed');
    </script>
